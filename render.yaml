services:
  - type: web
    name: tracksmart-backend
    runtime: node
    plan: free
    buildCommand: npm --prefix server install && npm --prefix server run build
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        scope: run
        value: https://tracksmart.vercel.app
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        scope: run
        value: ./server/firebase-service-account.json
